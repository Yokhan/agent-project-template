<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sp-xs:4px;--sp-s:8px;--sp-m:12px;--sp-l:16px;--sp-xl:20px;--sp-2xl:24px;
  --font-body:'Inter',system-ui,sans-serif;--font-mono:'Space Mono',monospace;
  --fs-xs:9px;--fs-s:11px;--fs-m:13px;--fs-l:15px;--fs-xl:18px;--fs-2xl:26px;--fs-chat:14px;
  --bg:#000;--sf:#0c0c0c;--sf2:#151515;--border:#1e1e1e;
  --text:#fff;--t2:#999;--t3:#555;--mute:#2a2a2a;
  --accent:#D71921;--green:#33d17a;--yellow:#f5c211;
  --dot:#222;--glow:rgba(215,25,33,.1);--chat-w:360px;
}
[data-theme="light"]{
  --bg:#fafafa;--sf:#f0f0f0;--sf2:#e6e6e6;--border:#d0d0d0;
  --text:#111;--t2:#666;--t3:#999;--mute:#bbb;--dot:#ccc;--glow:rgba(215,25,33,.08);
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;-webkit-font-smoothing:antialiased;font-size:var(--fs-m);transition:background .3s,color .3s}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:var(--sp-m) var(--sp-2xl);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr h1{font-size:var(--fs-m);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:4px;font-weight:400;color:var(--t2)}
.hdr .r{display:flex;align-items:center;gap:var(--sp-s)}
.hdr .r span{font-size:var(--fs-s);color:var(--t3);font-family:var(--font-mono)}
.hdr button{background:var(--sf);color:var(--t2);border:1px solid var(--border);padding:var(--sp-xs) var(--sp-m);font-family:var(--font-mono);font-size:var(--fs-xs);cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.hdr button:hover{color:var(--text);border-color:var(--t3);background:var(--sf2)}
.main{flex:1;display:flex;overflow:hidden;min-height:0}
.content{flex:1;padding:var(--sp-xl) var(--sp-2xl);overflow-y:auto}
.chat-side{width:var(--chat-w);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.stats{display:flex;gap:var(--sp-s);margin-bottom:var(--sp-xl)}
.stat{border:1px solid var(--border);padding:var(--sp-l);flex:1;text-align:center;background:var(--sf)}
.stat .n{font-size:var(--fs-2xl);font-weight:300;line-height:1;font-family:var(--font-mono)}
.stat .l{font-size:var(--fs-xs);color:var(--t3);text-transform:uppercase;letter-spacing:3px;margin-top:var(--sp-xs)}
.seg-title{font-size:var(--fs-xs);color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin:var(--sp-l) 0 var(--sp-s);font-family:var(--font-mono)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--sp-m);margin-bottom:var(--sp-m)}
.tile{background:var(--sf);border:1px solid var(--border);padding:var(--sp-l);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tile:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--glow),0 0 20px var(--glow)}
.tile::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,var(--dot) 1.5px,transparent 1.5px);background-size:10px 10px;opacity:.25;pointer-events:none;transition:opacity .2s}
.tile:hover::before{opacity:.45}
.tile .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-s)}
.tile .name{font-size:var(--fs-m);font-weight:600;display:flex;align-items:center;gap:var(--sp-xs)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.working{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.dot.idle{background:var(--yellow)}.dot.sleeping{background:var(--mute)}.dot.blocked{background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tile .task{font-size:var(--fs-s);color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile .row{display:flex;justify-content:space-between;font-size:var(--fs-s);color:var(--t3);margin-top:var(--sp-xs)}
.tile .bar{position:absolute;bottom:0;left:0;height:2px}
.back{font-size:var(--fs-s);color:var(--t2);cursor:pointer;text-transform:uppercase;letter-spacing:1px;margin-bottom:var(--sp-m);font-family:var(--font-mono)}
.back:hover{color:var(--text)}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-m);margin:var(--sp-m) 0}
.panel{border:1px solid var(--border);padding:var(--sp-m)}
.panel h3{font-size:var(--fs-xs);color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin-bottom:var(--sp-s);font-family:var(--font-mono)}
.panel .mod{display:flex;justify-content:space-between;font-size:var(--fs-s);padding:2px 0;color:var(--t2)}
.panel .ok{color:var(--green)}.panel .warning{color:var(--yellow)}.panel .error{color:var(--accent)}
.ch-title{font-size:var(--fs-xs);color:var(--t2);text-transform:uppercase;letter-spacing:2px;padding:var(--sp-m);border-bottom:1px solid var(--border);font-family:var(--font-mono);flex-shrink:0}
.ch-msgs{flex:1;overflow-y:auto;padding:var(--sp-m);display:flex;flex-direction:column;gap:var(--sp-s);min-height:0}
.m{max-width:85%;padding:var(--sp-s) var(--sp-m);font-size:var(--fs-chat);line-height:1.5;word-wrap:break-word}
.m.u{align-self:flex-end;background:var(--sf2);border:1px solid var(--border);color:var(--text)}
.m.a{align-self:flex-start;color:var(--t2)}
.m.sys{align-self:center;color:var(--t3);font-style:italic;font-size:var(--fs-s)}
.m code{font-family:var(--font-mono);font-size:12px;background:var(--sf);padding:1px 4px;border:1px solid var(--border)}
.m pre{white-space:pre-wrap;font-family:var(--font-mono);font-size:12px;background:var(--sf);padding:var(--sp-s);border:1px solid var(--border);margin:var(--sp-xs) 0;overflow-x:auto}
.m strong{color:var(--text);font-weight:600}
.m .ts{font-size:var(--fs-xs);color:var(--mute);margin-top:2px}
.ch-inp{display:flex;gap:var(--sp-s);padding:var(--sp-s) var(--sp-m);border-top:1px solid var(--border);flex-shrink:0}
.ch-inp input{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:var(--sp-s) var(--sp-m);font-family:var(--font-body);font-size:var(--fs-chat);outline:none}
.ch-inp input:focus{border-color:var(--t3)}
.ch-inp button{background:none;color:var(--text);border:1px solid var(--border);padding:var(--sp-s) var(--sp-l);font-family:var(--font-mono);font-size:var(--fs-xs);cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.ch-inp button:hover{border-color:var(--accent);color:var(--accent)}
.ch-inp button:disabled{opacity:.2}
.deleg{margin-top:var(--sp-s);display:flex;gap:var(--sp-s)}
.deleg button{padding:var(--sp-xs) var(--sp-m);border:none;cursor:pointer;font-family:var(--font-mono);font-size:var(--fs-xs);text-transform:uppercase}
.deleg .approve{background:var(--green);color:#000}
.deleg .reject{background:var(--accent);color:#fff}
.streaming{color:var(--t2);font-size:var(--fs-chat)}
.streaming::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.feed{border-top:1px solid var(--border);padding:var(--sp-xs) var(--sp-2xl);font-size:var(--fs-xs);color:var(--t3);max-height:50px;overflow-y:auto;flex-shrink:0;font-family:var(--font-mono)}
</style></head>
<body>
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.25.0",
    "preact/hooks": "https://esm.sh/preact@10.25.0/hooks",
    "htm/preact": "https://esm.sh/htm@3.1.1/preact",
    "@preact/signals": "https://esm.sh/@preact/signals@1.3.0"
  }
}
</script>
<script type="module">
import{signal,effect,computed}from'@preact/signals';
import{render}from'preact';
import{html}from'htm/preact';
import{useRef,useEffect}from'preact/hooks';

// ===== STATE =====
const agents=signal([]);
const currentProject=signal(null);
const sideMessages=signal([]);
const sideTitle=signal('orchestrator');
const streamText=signal('');
const isStreaming=signal(false);
const delegations=signal({});
const theme=signal(localStorage.getItem('theme')||'dark');
const feedItems=signal([]);
const clock=signal(new Date().toLocaleTimeString());
const segments=signal({});
const modules=signal([]);

// Clock tick
setInterval(()=>clock.value=new Date().toLocaleTimeString(),1000);

// Theme effect
effect(()=>{
  if(theme.value==='light')document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('theme',theme.value);
});

// Project switch → load chat
effect(()=>{
  const p=currentProject.value;
  sideTitle.value=p?p+' agent':'orchestrator';
  loadChat(p||'_orchestrator');
  if(p)loadModules(p);
});

// ===== API =====
async function loadAgents(){
  try{const r=await fetch('/api/agents');const d=await r.json();if(d.agents)agents.value=d.agents;}catch{}
}
async function loadSegments(){
  try{const r=await fetch('/api/segments');const d=await r.json();if(d.segments)segments.value=d.segments;}catch{}
}
async function loadChat(project){
  try{const r=await fetch('/api/chat/'+encodeURIComponent(project));const d=await r.json();sideMessages.value=d.messages||[];}catch{sideMessages.value=[];}
}
async function loadModules(project){
  try{const r=await fetch('/api/modules/'+encodeURIComponent(project));const d=await r.json();modules.value=d.modules||[];}catch{modules.value=[];}
}
async function loadFeed(){
  try{const r=await fetch('/api/feed');const d=await r.json();feedItems.value=d.feed||[];}catch{}
}

async function sendMessage(msg){
  if(!msg.trim())return;
  const proj=currentProject.value||'';
  // Add user message
  sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'user',msg}];
  isStreaming.value=true;streamText.value='';

  try{
    const r=await fetch('/api/chat-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project:proj,message:msg})});
    const reader=r.body.getReader();const dec=new TextDecoder();let buf='';let full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const ln of lines){
        if(!ln.startsWith('data: '))continue;
        const p=ln.slice(6);if(p==='[DONE]')break;
        try{const d=JSON.parse(p);if(d.text){full+=d.text;streamText.value=full;}}catch{}
      }
    }
    isStreaming.value=false;
    // Check for delegation
    const delegMatch=full.match(/<delegation id="([^"]+)" project="([^"]+)"\/>/);
    if(delegMatch){
      const[_,id,proj]=delegMatch;
      const taskMatch=full.match(/Awaiting approval.*?:\n(.*?)(?:\n\n|<delegation)/s);
      delegations.value={...delegations.value,[id]:{project:proj,task:taskMatch?taskMatch[1]:'',status:'pending'}};
    }
    sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'assistant',msg:full}];
    streamText.value='';
    loadFeed();
  }catch(e){
    isStreaming.value=false;
    sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'assistant',msg:'Error: '+e.message}];
  }
}

async function approveDel(id){
  const d={...delegations.value};d[id]={...d[id],status:'running'};delegations.value=d;
  try{
    const r=await fetch('/api/approve/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const res=await r.json();
    const d2={...delegations.value};d2[id]={...d2[id],status:'done',response:res.response||''};delegations.value=d2;
    sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'system',msg:'✓ '+res.project+': '+((res.response||'').substring(0,200))}];
  }catch(e){
    const d2={...delegations.value};d2[id]={...d2[id],status:'error'};delegations.value=d2;
  }
}
async function rejectDel(id){
  const d={...delegations.value};d[id]={...d[id],status:'rejected'};delegations.value=d;
  fetch('/api/reject/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
}

// ===== HELPERS =====
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function md(s){if(!s)return'';return esc(s).replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/^- (.+)$/gm,'<div style="padding-left:12px">• $1</div>').replace(/\n/g,'<br>');}
const ft=t=>{if(!t)return'';try{return new Date(t).toLocaleTimeString();}catch{return t;}};
const statusColor={working:'var(--green)',idle:'var(--yellow)',sleeping:'var(--mute)',blocked:'var(--accent)'};
const statusLabel={working:'active',idle:'idle',sleeping:'sleeping',blocked:'blocked'};

// ===== COMPONENTS =====
function App(){
  return html`
    <div class="app">
      <${Header}/>
      <div class="main">
        ${currentProject.value?html`<${DetailView}/>`:html`<${DashboardView}/>`}
        <${ChatSidebar}/>
      </div>
      <${Feed}/>
    </div>`;
}

function Header(){
  return html`<div class="hdr">
    <h1>command center</h1>
    <div class="r">
      <button onClick=${()=>fetch('/api/action/briefing',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(r=>r.json()).then(d=>alert(d.text||JSON.stringify(d)))}>briefing</button>
      <button onClick=${()=>loadAgents()}>refresh</button>
      <button onClick=${()=>theme.value=theme.value==='dark'?'light':'dark'}>${theme.value==='dark'?'light':'dark'}</button>
      <span>${clock}</span>
    </div>
  </div>`;
}

function StatsRow(){
  const a=agents.value;
  const needAttn=a.filter(x=>x.blockers||(x.uncommitted||0)>20).length;
  const active=a.filter(x=>x.task).length;
  const healthy=a.filter(x=>!x.blockers&&x.status!=='sleeping').length;
  const stale=a.filter(x=>(x.days||999)>7).length;
  return html`<div class="stats">
    <div class="stat"><div class="n" style="color:${needAttn?'var(--accent)':'var(--green)'}">${needAttn}</div><div class="l">need attention</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${active}</div><div class="l">in progress</div></div>
    <div class="stat"><div class="n">${healthy}</div><div class="l">healthy</div></div>
    <div class="stat"><div class="n" style="color:var(--mute)">${stale}</div><div class="l">stale</div></div>
    <div class="stat"><div class="n">${a.length}</div><div class="l">total</div></div>
  </div>`;
}

function DashboardView(){
  const seg=segments.value;
  const a=agents.value;
  // Build segment → agents map
  const segMap={};const assigned=new Set();
  for(const[name,projects]of Object.entries(seg)){
    segMap[name]=a.filter(x=>projects.includes(x.name));
    projects.forEach(p=>assigned.add(p));
  }
  const other=a.filter(x=>!assigned.has(x.name));
  if(other.length)segMap['Other']=other;

  return html`<div class="content">
    <${StatsRow}/>
    ${Object.entries(segMap).filter(([_,items])=>items.length).map(([name,items])=>html`
      <div class="seg-title">${name} (${items.length})</div>
      <div class="grid">${items.map(ag=>html`<${ProjectTile} agent=${ag}/>`)}</div>
    `)}
  </div>`;
}

function ProjectTile({agent:a}){
  const task=a.task||'';
  const blocker=a.blockers?html` <span style="color:var(--accent);font-size:var(--fs-xs);font-weight:600">· BLOCKED</span>`:'';
  return html`<div class="tile" onClick=${()=>currentProject.value=a.name}>
    <div class="top">
      <span class="name"><span class="dot ${a.status}"></span>${a.name}${blocker}</span>
      <span style="font-size:var(--fs-xs);color:var(--t3)">${a.phase||''}</span>
    </div>
    <div class="task" dangerouslySetInnerHTML=${{__html:task?md(task.substring(0,80)):'<span style="color:var(--t3)">no active task</span>'}}></div>
    <div class="row">
      <span style="color:${statusColor[a.status]||'var(--t3)'}">${statusLabel[a.status]||a.status}</span>
      <span>${a.last_commit||''}</span>
      ${a.lessons?html`<span>${a.lessons}L</span>`:''}
    </div>
    <div class="bar" style="width:${Math.min(100,Math.max(5,a.task?60:a.days<7?40:10))}%;background:${statusColor[a.status]||'var(--mute)'}"></div>
  </div>`;
}

function DetailView(){
  const name=currentProject.value;
  const ag=agents.value.find(a=>a.name===name)||{};
  return html`<div class="content">
    <div class="back" onClick=${()=>currentProject.value=null}>← back to dashboard</div>
    <h2 style="font-size:var(--fs-xl);margin-bottom:var(--sp-xs);display:flex;align-items:center;gap:var(--sp-s)">
      <span class="dot ${ag.status}"></span>${name}
    </h2>
    <div style="font-size:var(--fs-s);color:var(--t2);margin-bottom:var(--sp-m)">
      <span style="color:${statusColor[ag.status]||'var(--t3)'}">${ag.status||''}</span> ·
      ${ag.branch||''} · ${ag.uncommitted||0} uncommitted · ${ag.last_commit||''}
      ${ag.phase?html` · <span>${ag.phase}</span>`:''}
      ${ag.task?html`<div style="margin-top:var(--sp-xs)" dangerouslySetInnerHTML=${{__html:'Task: '+md(ag.task)}}></div>`:''}
    </div>
    <div class="panels">
      <div class="panel"><h3>modules</h3>
        ${modules.value.length?modules.value.map(m=>html`<div class="mod"><span>${m.name}</span><span class="${m.status}">${m.status} ${m.files}f/${m.lines}L</span></div>`):html`<span style="color:var(--t2)">no modules detected</span>`}
      </div>
      <div class="panel"><h3>info</h3>
        <div style="font-size:var(--fs-s);color:var(--t2)">
          <div>branch: <code>${ag.branch||''}</code></div>
          <div>uncommitted: ${ag.uncommitted||0}</div>
          <div>template: ${ag.template_version||'none'}</div>
          <div>lessons: ${ag.lessons||0}</div>
          <div>segment: ${ag.segment||''}</div>
          ${ag.blockers?html`<div style="color:var(--accent);font-weight:600;margin-top:var(--sp-xs)">⚠ BLOCKER ACTIVE</div>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function ChatSidebar(){
  const inputRef=useRef();
  const msgsRef=useRef();
  useEffect(()=>{if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[sideMessages.value,streamText.value]);

  const onSend=()=>{
    const v=inputRef.current.value;if(!v.trim())return;
    inputRef.current.value='';sendMessage(v);
  };

  return html`<div class="chat-side">
    <div class="ch-title">${sideTitle}</div>
    <div class="ch-msgs" ref=${msgsRef}>
      ${sideMessages.value.map(m=>html`<${ChatMessage} msg=${m}/>`)}
      <${StreamingBubble}/>
    </div>
    <div class="ch-inp">
      <input ref=${inputRef} placeholder="talk to ${sideTitle}..."
        onKeyDown=${e=>{if(e.key==='Enter'){e.preventDefault();onSend();}}}
        disabled=${isStreaming.value}/>
      <button onClick=${onSend} disabled=${isStreaming.value}>send</button>
    </div>
  </div>`;
}

function ChatMessage({msg:m}){
  if(m.role==='system')return html`<div class="m sys">${m.msg}</div>`;
  const cls=m.role==='user'?'u':'a';
  // Check for delegation tag
  const delegMatch=m.msg&&m.msg.match(/<delegation id="([^"]+)" project="([^"]+)"\/>/);
  const cleanMsg=m.msg?m.msg.replace(/<delegation[^>]*\/>/g,''):'';
  return html`<div class="m ${cls}">
    <div dangerouslySetInnerHTML=${{__html:m.role==='assistant'?md(cleanMsg):esc(m.msg)}}></div>
    ${delegMatch?html`<${DelegationCard} id=${delegMatch[1]} project=${delegMatch[2]}/>`:null}
    <div class="ts">${ft(m.ts)}</div>
  </div>`;
}

function StreamingBubble(){
  if(!isStreaming.value&&!streamText.value)return null;
  if(!streamText.value)return html`<div class="m a streaming">thinking</div>`;
  return html`<div class="m a"><div dangerouslySetInnerHTML=${{__html:md(streamText.value)}}></div></div>`;
}

function DelegationCard({id,project}){
  const d=delegations.value[id];
  if(!d)return html`<div class="deleg"><button class="approve" onClick=${()=>approveDel(id)}>approve</button><button class="reject" onClick=${()=>rejectDel(id)}>reject</button></div>`;
  if(d.status==='pending')return html`<div class="deleg"><button class="approve" onClick=${()=>approveDel(id)}>approve</button><button class="reject" onClick=${()=>rejectDel(id)}>reject</button></div>`;
  if(d.status==='running')return html`<div style="color:var(--yellow);font-size:var(--fs-s)">⏳ executing in ${project}...</div>`;
  if(d.status==='done')return html`<div style="color:var(--green);font-size:var(--fs-s)">✓ done</div>`;
  if(d.status==='rejected')return html`<div style="color:var(--accent);font-size:var(--fs-s)">✗ rejected</div>`;
  return null;
}

function Feed(){
  return html`<div class="feed">
    ${feedItems.value.length?feedItems.value.map(e=>html`<span>${ft(e.time)} [${e.type}] <b>${e.project||''}</b> ${(e.message||'').substring(0,40)}  </span>`):'no activity'}
  </div>`;
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Escape'){currentProject.value=null;return;}
  if(e.key==='/'||e.key==='Enter'){e.preventDefault();document.querySelector('.ch-inp input')?.focus();return;}
  if(e.key==='d'||e.key==='D'){theme.value=theme.value==='dark'?'light':'dark';return;}
});

// ===== INIT =====
await Promise.all([loadAgents(),loadSegments(),loadFeed()]);
render(html`<${App}/>`,document.body);
setInterval(()=>{loadAgents();if(!currentProject.value)loadChat('_orchestrator');loadFeed();},30000);
</script>
</body></html>
