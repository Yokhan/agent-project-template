<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Agent Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a15;color:#d0d0e0;font-family:-apple-system,system-ui,sans-serif;overflow:hidden}
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:auto 1fr auto;height:100vh}
.hdr{grid-column:1/-1;padding:8px 15px;background:#0f0f1a;border-bottom:1px solid #1a1a30;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:1.1em;color:#fff}
.hdr .t{color:#555;font-size:.75em}
.hdr .btns{display:flex;gap:5px}
.hdr .btns button{background:#161630;color:#777;border:1px solid #252545;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.7em}
.hdr .btns button:hover{background:#1e1e40;color:#aaa}
.side{background:#0d0d18;border-right:1px solid #1a1a30;display:flex;flex-direction:column;overflow:hidden}
.side .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px}
.side .st{background:#12122a;padding:6px;border-radius:5px;text-align:center}
.side .st .n{font-size:1.2em;font-weight:700}
.side .st .l{font-size:.6em;color:#555}
.side .list{flex:1;overflow-y:auto}
.side .item{padding:8px 12px;border-bottom:1px solid #111;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.side .item:hover{background:#12122a}
.side .item.active{background:#161635;border-left:3px solid #3a6a9a}
.side .item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.side .item .dot.working{background:#22c55e;animation:pulse 2s infinite}
.side .item .dot.idle{background:#eab308}
.side .item .dot.sleeping{background:#444}
.side .info{flex:1;min-width:0}
.side .info .name{font-size:.85em;font-weight:600;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side .info .meta{font-size:.65em;color:#555}
.side .info .last{font-size:.7em;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side .time{font-size:.6em;color:#444;flex-shrink:0}
.side .modules{padding:6px 12px;border-top:1px solid #1a1a30;max-height:150px;overflow-y:auto;font-size:.7em}
.side .modules .mod{display:flex;justify-content:space-between;padding:2px 0;color:#777}
.side .modules .ok{color:#22c55e}.side .modules .warning{color:#eab308}.side .modules .error{color:#ef4444}
.chat{display:flex;flex-direction:column;overflow:hidden}
.chat .chdr{padding:10px 15px;border-bottom:1px solid #1a1a30;font-weight:600;font-size:.9em;color:#fff;display:flex;justify-content:space-between;align-items:center}
.chat .chdr .ps{font-size:.7em;color:#666;font-weight:400}
.msgs{flex:1;overflow-y:auto;padding:12px 15px;display:flex;flex-direction:column;gap:8px}
.m{max-width:80%;padding:8px 12px;border-radius:12px;font-size:.85em;line-height:1.4;word-wrap:break-word}
.m.u{align-self:flex-end;background:#1e3a5f;color:#d0e0ff;border-bottom-right-radius:3px}
.m.a{align-self:flex-start;background:#1a1a30;color:#c0c0d0;border-bottom-left-radius:3px}
.m pre{white-space:pre-wrap;font-size:.8em;margin-top:4px;color:#8899aa;font-family:monospace}
.m .ts{font-size:.6em;color:#555;margin-top:3px}
.typing{padding:8px 15px;font-size:.75em;color:#666;font-style:italic;display:none}
.inp{display:flex;gap:6px;padding:10px 15px;border-top:1px solid #1a1a30}
.inp input{flex:1;background:#12122a;color:#d0d0e0;border:1px solid #2a2a4a;padding:9px 12px;border-radius:8px;font-size:.85em;outline:none}
.inp input:focus{border-color:#3a5a8a}
.inp button{background:#1e3a5f;color:#d0e0ff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:.85em}
.inp button:hover{background:#2a4a7f}
.inp button:disabled{opacity:.3;cursor:wait}
.feed{grid-column:1/-1;border-top:1px solid #1a1a30;padding:5px 12px;max-height:80px;overflow-y:auto;font-size:.65em;color:#555;background:#08080f}
.feed .e{padding:2px 0}.feed .tm{color:#444;margin-right:4px}.feed .tp{color:#3a6a9a;margin-right:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style></head>
<body>
<div class="app">
  <div class="hdr">
    <h1>Agent Command Center</h1>
    <div class="btns">
      <button onclick="act('briefing')">Briefing</button>
      <button onclick="act('drift')">Drift</button>
      <button onclick="act('weekly')">Weekly</button>
      <button onclick="loadAll()">Refresh</button>
    </div>
    <span class="t" id="ts"></span>
  </div>
  <div class="side">
    <div class="stats" id="stats"></div>
    <div class="list" id="list"></div>
    <div class="modules" id="modules"></div>
  </div>
  <div class="chat">
    <div class="chdr"><span id="ct">Select a project</span><span class="ps" id="cs"></span></div>
    <div class="msgs" id="msgs"></div>
    <div class="typing" id="typ">Agent is thinking...</div>
    <div class="inp">
      <input id="ci" placeholder="Message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}">
      <button id="cb" onclick="send()">Send</button>
    </div>
  </div>
  <div class="feed" id="feed">Loading...</div>
</div>
<script>
let agents=[],cur='',chatMap={};
async function loadAgents(){
  try{const r=await fetch('/api/agents');const d=await r.json();if(d.agents)agents=d.agents;document.getElementById('ts').textContent=new Date().toLocaleString();}catch(e){console.error(e);}
}
async function loadChats(){
  try{const r=await fetch('/api/chats');const d=await r.json();chatMap={};(d.chats||[]).forEach(c=>chatMap[c.project]=c);}catch{}
}
async function loadFeed(){
  try{const r=await fetch('/api/feed');const d=await r.json();document.getElementById('feed').innerHTML=(d.feed||[]).map(e=>`<span class="e"><span class="tm">${ft(e.time)}</span><span class="tp">[${e.type}]</span><b>${e.project||''}</b> ${(e.message||'').substring(0,40)}</span> `).join('')||'No activity';}catch{}
}
async function loadAll(){await Promise.all([loadAgents(),loadChats(),loadFeed()]);renderSide();}

function renderSide(){
  const h=agents.filter(a=>a.status==='working').length;
  const i=agents.filter(a=>a.status==='idle').length;
  const s=agents.filter(a=>a.status==='sleeping').length;
  document.getElementById('stats').innerHTML=
    `<div class="st"><div class="n" style="color:#22c55e">${h}</div><div class="l">Working</div></div>`+
    `<div class="st"><div class="n" style="color:#eab308">${i}</div><div class="l">Idle</div></div>`+
    `<div class="st"><div class="n" style="color:#555">${s}</div><div class="l">Sleep</div></div>`;
  const items=agents.map(a=>({...a,...(chatMap[a.name]||{})}));
  items.sort((a,b)=>(b.last_ts||'').localeCompare(a.last_ts||'')||(a.days||999)-(b.days||999));
  const o=chatMap['_orchestrator']||{};
  let html=`<div class="item ${cur===''?'active':''}" onclick="sel('')"><div class="dot working"></div><div class="info"><div class="name">PA Orchestrator</div><div class="last">${esc(o.last_msg||'Start here...')}</div></div></div>`;
  for(const a of items){
    html+=`<div class="item ${cur===a.name?'active':''}" onclick="sel('${a.name}')"><div class="dot ${a.status}"></div><div class="info"><div class="name">${esc(a.name)}</div><div class="meta">${esc(a.branch||'')} · ${a.uncommitted||0} dirty</div><div class="last">${esc(a.last_msg||'')}</div></div><div class="time">${a.last_commit||''}</div></div>`;
  }
  document.getElementById('list').innerHTML=html;
}

async function sel(name){
  cur=name;renderSide();
  document.getElementById('ct').textContent=name||'PA Orchestrator';
  const ep=name?'/api/chat/'+name:'/api/chat/_orchestrator';
  try{
    const r=await fetch(ep);const d=await r.json();
    document.getElementById('msgs').innerHTML=(d.messages||[]).map(m=>
      `<div class="m ${m.role==='user'?'u':'a'}">${m.role==='assistant'?'<pre>'+esc(m.msg)+'</pre>':esc(m.msg)}<div class="ts">${ft(m.ts)}</div></div>`
    ).join('');
    document.getElementById('msgs').scrollTop=9999;
  }catch{}
  if(name){
    try{const r=await fetch('/api/modules/'+name);const d=await r.json();
      document.getElementById('modules').innerHTML=(d.modules||[]).map(m=>`<div class="mod"><span>${esc(m.name)}</span><span class="${m.status}">${m.status} ${m.files}f/${m.lines}L</span></div>`).join('')||'No modules';
    }catch{document.getElementById('modules').innerHTML='';}
    const ag=agents.find(a=>a.name===name);
    document.getElementById('cs').textContent=ag?`${ag.status} · ${ag.uncommitted} dirty · ${ag.branch}`:'';
  }else{document.getElementById('modules').innerHTML='';document.getElementById('cs').textContent='orchestrator';}
  document.getElementById('ci').focus();
}

async function send(){
  const inp=document.getElementById('ci');const msg=inp.value.trim();if(!msg)return;
  const ms=document.getElementById('msgs');
  ms.innerHTML+=`<div class="m u">${esc(msg)}<div class="ts">${ft()}</div></div>`;
  inp.value='';document.getElementById('cb').disabled=true;document.getElementById('typ').style.display='block';ms.scrollTop=9999;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project:cur,message:msg})});
    const d=await r.json();document.getElementById('typ').style.display='none';
    if(d.status==='complete')ms.innerHTML+=`<div class="m a"><pre>${esc(d.response||'')}</pre><div class="ts">${ft(d.ts)}</div></div>`;
    else ms.innerHTML+=`<div class="m a" style="color:#ef4444">Error: ${esc(d.error||'?')}</div>`;
  }catch(e){document.getElementById('typ').style.display='none';ms.innerHTML+=`<div class="m a" style="color:#ef4444">${esc(e.message)}</div>`;}
  document.getElementById('cb').disabled=false;ms.scrollTop=9999;loadChats().then(renderSide);loadFeed();
}

async function act(n){
  try{const r=await fetch('/api/action/'+n,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});const d=await r.json();alert(d.text||JSON.stringify(d).substring(0,300));loadAll();}catch(e){alert(e.message);}
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ft(t){if(!t)return new Date().toLocaleTimeString();try{return new Date(t).toLocaleTimeString();}catch{return t;}}
loadAll();setInterval(()=>{loadAgents();loadChats().then(renderSide);},30000);setInterval(loadFeed,15000);
</script>
</body></html>
