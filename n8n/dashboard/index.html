<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
/* === DESIGN TOKENS === */
:root{
  /* Spacing */
  --sp-xs:4px;--sp-s:8px;--sp-m:16px;--sp-l:24px;--sp-xl:32px;--sp-2xl:48px;
  /* Typography */
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'Space Mono',monospace;
  --fs-xs:10px;--fs-s:12px;--fs-m:14px;--fs-l:16px;--fs-xl:22px;--fs-2xl:36px;
  --fs-chat:15px;--fs-chat-pre:12px;
  --lh:1.6;
  /* Colors — Dark */
  --bg:#08080c;--sf:#0c0c12;--sf2:#12121a;--border:#1c1c28;
  --text:#fff;--t2:#999;--t3:#555;--mute:#2a2a2a;
  --accent:#D71921;--green:#33d17a;--yellow:#f5c211;
  --dot:#222;--glow:rgba(215,25,33,.1);
  /* Radii */
  --r:0px;
  /* Chat sidebar */
  --chat-w:380px;
}
[data-theme="light"]{
  --bg:#f5f5fa;--sf:#eaeaf2;--sf2:#dddde8;--border:#c0c0d0;
  --text:#111;--t2:#444;--t3:#777;--mute:#aaa;
  --dot:#ccc;--glow:rgba(215,25,33,.08);
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;font-size:var(--fs-m);line-height:var(--lh)}

/* === LAYOUT === */
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:var(--sp-l) var(--sp-2xl);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr h1{font-size:var(--fs-l);font-family:'Space Grotesk',var(--font-mono);text-transform:uppercase;letter-spacing:6px;font-weight:400;color:var(--t2)}
.hdr .r{display:flex;align-items:center;gap:var(--sp-s)}
.hdr .r span{font-size:var(--fs-s);color:var(--t3);font-family:var(--font-mono)}
.hdr .r button{background:transparent;color:var(--t2);border:1px solid var(--border);padding:var(--sp-xs) var(--sp-m);font-family:var(--font-mono);font-size:var(--fs-xs);cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.hdr .r button:hover{color:var(--text);border-color:var(--t3);background:var(--sf2)}

/* === MAIN: dashboard view === */
.main{flex:1;display:flex;overflow:hidden;min-height:0}
.content{flex:1;padding:var(--sp-xl) var(--sp-2xl);overflow-y:auto}
.chat-side{width:var(--chat-w);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* === STATS ROW === */
.stats{display:flex;gap:var(--sp-s);margin-bottom:var(--sp-xl)}
.stat{border:1px solid var(--border);padding:var(--sp-l) var(--sp-m);flex:1;text-align:center;background:transparent}
.stat .n{font-size:var(--fs-2xl);font-weight:200;line-height:1;font-family:var(--font-mono)}
.stat .l{font-size:var(--fs-xs);color:var(--t3);text-transform:uppercase;letter-spacing:3px;margin-top:var(--sp-xs)}


[data-theme="light"] .tile{border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
[data-theme="light"] .tile:hover{box-shadow:0 2px 12px rgba(233,69,96,.12)}
[data-theme="light"] .stat{border:1px solid var(--border)}
[data-theme="light"] .seg-title{border-top:1px dashed var(--border)}
[data-theme="light"] .plan-panel{border:1px solid var(--border)}
[data-theme="light"] .ch-inp input{border:1px solid var(--border)}

/* === SEGMENT HEADERS === */
.seg-title{font-size:var(--fs-s);color:var(--t2);text-transform:uppercase;letter-spacing:4px;font-family:var(--font-mono);padding:var(--sp-m) 0 var(--sp-s);border-top:1px solid var(--border);margin-top:var(--sp-l)}
.seg-title:first-of-type{border-top:none;margin-top:0}

/* === PROJECT GRID === */
.grid-title{font-size:var(--fs-xs);color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin-bottom:var(--sp-m);font-family:var(--font-mono)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--sp-m);margin-bottom:var(--sp-xl)}
.tile{background:var(--sf);border:1px solid var(--border);padding:var(--sp-l);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tile:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--glow),0 0 20px var(--glow)}
.tile::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,var(--dot) 1px,transparent 1px);background-size:18px 18px;opacity:.5;pointer-events:none;transition:opacity .2s}

.tile .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tile .name{font-size:var(--fs-l);font-weight:600;display:flex;align-items:center;gap:var(--sp-xs);letter-spacing:-.2px}
.tile .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.tile .dot.working{background:var(--green);box-shadow:0 0 6px var(--green)}
.tile .dot.idle{background:var(--yellow)}
.tile .dot.sleeping{background:var(--mute)}
.tile .ver{font-size:var(--fs-xs);color:var(--t3);font-family:var(--font-mono)}
.tile .row{display:flex;justify-content:space-between;font-size:var(--fs-s);color:var(--t2);margin-top:var(--sp-xs)}
.tile .branch{font-size:var(--fs-s);color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile .bar{display:none} /* replaced by segmented */
.tile .seg{position:absolute;bottom:0;left:0;right:0;display:flex;gap:2px;padding:0 1px;height:4px}
.tile .seg span{flex:1;transition:background .3s}
.tile .actions{position:absolute;top:var(--sp-xs);right:var(--sp-xs);display:none;gap:var(--sp-xs)}
.tile:hover .actions{display:flex}
.tile .actions button{background:var(--bg);color:var(--t2);border:1px solid var(--border);width:24px;height:24px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .15s}
.tile .actions button:hover{color:var(--text);border-color:var(--accent)}

/* === PROJECT DETAIL (inside view) === */
.detail{display:none;flex-direction:column;flex:1}
.detail.show{display:flex}
.detail .back{font-size:10px;color:var(--t2);cursor:pointer;padding:8px 0;text-transform:uppercase;letter-spacing:1px}
.detail .back:hover{color:var(--text)}
.detail .proj-hdr{padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.detail .proj-hdr h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.detail .proj-hdr .meta{font-size:10px;color:var(--t2);margin-top:4px}
.detail .panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.panel{border:1px solid var(--border);padding:12px}
.panel h3{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.panel .mod{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #0a0a0a}
.panel .ok{color:var(--green)}.panel .warning{color:var(--yellow)}.panel .error{color:var(--accent)}
.detail .chat-area{flex:1;display:flex;flex-direction:column;border-top:1px solid var(--border);min-height:300px}

/* === CHAT (shared) === */
.ch-title{font-size:var(--fs-s);color:var(--t2);text-transform:uppercase;letter-spacing:2px;padding:var(--sp-m);border-bottom:1px solid var(--border);font-family:var(--font-mono);flex-shrink:0}
.ch-msgs{flex:1;overflow-y:auto;padding:var(--sp-m);display:flex;flex-direction:column;gap:var(--sp-s);min-height:0}
.m{max-width:88%;padding:var(--sp-m) var(--sp-l);font-size:var(--fs-chat);line-height:var(--lh);word-wrap:break-word}
.m.u{align-self:flex-end;background:var(--sf2);border:1px solid var(--border);color:var(--text)}
.m.a{align-self:flex-start;color:var(--t2)}
.m pre{white-space:pre-wrap;font-size:var(--fs-chat-pre);margin:var(--sp-xs) 0;font-family:var(--font-mono);line-height:1.5;background:var(--sf);padding:var(--sp-s);border:1px solid var(--border);overflow-x:auto}
.m code{font-family:var(--font-mono);font-size:var(--fs-chat-pre);background:var(--sf);padding:1px 4px;border:1px solid var(--border)}
.m strong{color:var(--text);font-weight:600}
.m em{color:var(--t2);font-style:italic}
.m .ts{font-size:var(--fs-xs);color:var(--mute);margin-top:var(--sp-xs)}
.ch-typ{padding:var(--sp-s) var(--sp-m);font-size:var(--fs-s);color:var(--t2);display:none;font-family:var(--font-mono)}
.ch-typ.show{display:block}
.ch-typ::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.ch-inp{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end;background:var(--sf)}
.ch-inp input{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:var(--sp-s) var(--sp-m);font-family:var(--font-body);font-size:var(--fs-chat);outline:none}
.ch-inp input:focus{border-color:var(--mute)}
.ch-inp button.send-btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;font-family:var(--font-mono);font-size:var(--fs-xs);cursor:pointer;text-transform:uppercase;letter-spacing:2px;flex-shrink:0;height:42px;transition:opacity .15s}
.ch-inp button.send-btn:hover{opacity:.85}
.ch-inp button.send-btn:disabled{opacity:.3;cursor:default}




/* === TOASTS === */
.toasts{position:fixed;bottom:60px;right:var(--sp-2xl);z-index:999;display:flex;flex-direction:column;gap:var(--sp-xs)}
.toast{padding:var(--sp-s) var(--sp-l);font-size:var(--fs-s);font-family:var(--font-mono);border:1px solid var(--border);background:var(--sf);color:var(--text);animation:slideIn .2s;max-width:360px}
.toast.error{border-color:var(--accent);color:var(--accent)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.info{border-color:var(--yellow);color:var(--yellow)}

/* === ANIMATIONS === */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}



/* Tile state variants */
.tile.t-working{border-left:3px solid var(--green);background:color-mix(in srgb,var(--sf) 92%,var(--green))}
.tile.t-blocked{border-left:3px solid var(--accent);background:color-mix(in srgb,var(--sf) 94%,var(--accent))}
.tile.t-sleeping{opacity:.45;filter:saturate(.3)}
.tile.t-sleeping:hover{opacity:.7;filter:saturate(.6)}
.tile.t-unmanaged{opacity:.5;border-style:dashed}
.tile.t-unmanaged:hover{opacity:.7}
.tile.t-unmanaged .sys{color:var(--yellow)}

/* Micro-text decoration */
.tile .sys{position:absolute;top:8px;right:20px;font-family:var(--font-mono);font-size:7px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;opacity:.5}
.tile:hover .sys{opacity:.8}

/* === CYBER ELEMENTS === */
.stat::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);pointer-events:none}
.stat{position:relative;overflow:hidden}
.stat:hover{background:var(--accent-dim)}
.stat.s-alert{border-left:3px solid var(--accent)}
.stat.s-alert .n{color:var(--accent)}
.stat.s-active{border-left:3px solid var(--green)}
.stat.s-active .n{color:var(--green)}

/* Corner cuts on tiles */
.tile{clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px))}
.tile:hover{clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));box-shadow:0 0 30px var(--glow),inset 0 0 30px rgba(233,69,96,.03);backdrop-filter:blur(2px)}

/* Corner decoration on tiles */
.tile::after{content:'';position:absolute;top:0;right:0;width:12px;height:12px;border-left:1px solid var(--accent);border-bottom:1px solid var(--accent);opacity:.3;pointer-events:none}
.tile:hover::after{opacity:.8}

/* Glowing status bar */
.tile .bar{height:2px;box-shadow:0 0 6px currentColor}

/* Segmented progress (Nothing style) */
.seg-bar{display:flex;gap:2px;height:3px}
.seg-bar span{flex:1;background:var(--mute)}
.seg-bar span.fill{background:var(--green)}
.seg-bar span.warn{background:var(--yellow)}
.seg-bar span.err{background:var(--accent)}

/* Micro text decorations */
.micro{font-family:var(--font-mono);font-size:8px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}

/* Neon glow text */
.glow{text-shadow:0 0 8px currentColor,0 0 20px rgba(233,69,96,.3)}

/* Stat card active glow */
.stat:hover .n{text-shadow:0 0 12px currentColor}

/* Header accent line */
.hdr{border-bottom:1px solid var(--border);border-image:linear-gradient(90deg,var(--border) 0%,var(--accent) 50%,var(--border) 100%) 1}

/* Chat sidebar subtle gradient */
.chat-side{background:linear-gradient(180deg,var(--sf) 0%,var(--bg) 100%)}

/* Plan panel cyber border */
.plan-panel{border:1px solid var(--border);border-left:2px solid var(--accent)}
.plan-hdr{background:var(--sf2)}

/* Detail back button — accent on hover */
.back:hover{color:var(--accent) !important}

/* Keyboard help — cyber frame */
.kb-box{border:1px solid var(--accent);clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px))}

/* Analytics bar — border glow */
.analytics-bar{border-top:1px solid var(--border);border-image:linear-gradient(90deg,transparent,var(--accent),transparent) 1}

/* Toast — cyber cut */
.toast{clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}

/* Search input — accent focus */
.search input:focus{border-color:var(--accent);box-shadow:0 0 8px var(--glow)}

/* === LOADING === */
.loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:10;font-family:var(--font-mono);color:var(--t3);font-size:var(--fs-s)}

/* === BADGE === */
.badge{background:var(--accent);color:#fff;font-size:8px;min-width:16px;height:16px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);padding:0 4px;margin-left:4px}


/* === SEARCH === */
.search{margin-bottom:var(--sp-m);display:flex;gap:var(--sp-s);align-items:center}
.search input{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:var(--sp-s) var(--sp-m);font-family:var(--font-mono);font-size:var(--fs-s);outline:none}
.search input:focus{border-color:var(--t3)}
.search input::placeholder{color:var(--t3)}

/* === PLAN PANEL === */
.plan-panel{border:1px solid var(--border);margin-bottom:var(--sp-l);max-height:200px;overflow-y:auto}
.plan-panel .plan-hdr{font-size:var(--fs-xs);color:var(--t2);text-transform:uppercase;letter-spacing:2px;padding:var(--sp-s) var(--sp-m);border-bottom:1px solid var(--border);font-family:var(--font-mono);display:flex;justify-content:space-between;align-items:center;cursor:pointer;position:sticky;top:0;background:var(--sf)}
.plan-item{display:flex;gap:var(--sp-m);padding:var(--sp-xs) var(--sp-m);border-bottom:1px solid var(--border);font-size:var(--fs-s);align-items:center}
.plan-item:last-child{border-bottom:none}
.plan-item .pri{font-family:var(--font-mono);font-size:8px;min-width:40px;text-align:center;padding:3px 6px;border:1px solid;letter-spacing:1px}
.plan-item .pri.HIGH{color:var(--accent);border-color:var(--accent)}
.plan-item .pri.MED{color:var(--yellow);border-color:var(--yellow)}
.plan-item .pri.LOW{color:var(--t3);border-color:var(--border)}
.plan-item .proj{color:var(--text);font-weight:500;min-width:120px}
.plan-item .issue{color:var(--t2);flex:1}
.plan-item .act{color:var(--t3);font-size:var(--fs-xs);cursor:pointer}
.plan-item .act:hover{color:var(--accent)}

/* === KEYBOARD HELP === */
.kb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.kb-box{background:var(--sf);border:1px solid var(--border);padding:var(--sp-2xl);min-width:400px;max-width:500px}
.kb-box h2{font-size:var(--fs-l);font-family:var(--font-mono);margin-bottom:var(--sp-l);text-transform:uppercase;letter-spacing:2px}
.kb-row{display:flex;justify-content:space-between;padding:var(--sp-xs) 0;border-bottom:1px solid var(--border);font-size:var(--fs-s)}
.kb-row:last-child{border:none}
.kb-key{font-family:var(--font-mono);color:var(--accent);min-width:80px}
.kb-desc{color:var(--t2)}

/* === ANALYTICS FOOTER === */
.analytics-bar{border-top:1px solid var(--border);border-image:linear-gradient(90deg,transparent,var(--accent),transparent) 1;padding:var(--sp-s) var(--sp-2xl);font-size:var(--fs-s);color:var(--t2);display:flex;gap:0;font-family:var(--font-mono);flex-shrink:0;align-items:center}
.analytics-bar .metric{display:flex;gap:var(--sp-xs);align-items:center;padding:0 var(--sp-m);border-right:1px solid var(--border)}
.analytics-bar .metric:last-child{border-right:none}
.analytics-bar .metric .v{color:var(--text);font-weight:500}
.analytics-bar .metric .v.alert{color:var(--accent);font-size:var(--fs-m);font-weight:600}


/* === CHAT UPGRADE === */
.ch-inp textarea{flex:1;min-width:0;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:10px 14px;font-family:var(--font-body);font-size:15px;outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.5;overflow-y:auto;box-sizing:border-box;border-radius:0}
.ch-inp textarea:focus{border-color:var(--t3);box-shadow:none}
.ch-inp textarea::placeholder{color:var(--t3)}
.m pre{position:relative}
.m pre .copy-btn{position:absolute;top:4px;right:8px;background:var(--sf2);color:var(--t2);border:1px solid var(--border);padding:2px 8px;font-size:9px;cursor:pointer;font-family:var(--font-mono);opacity:0;transition:opacity .15s}
.m pre:hover .copy-btn{opacity:1}
.m pre .copy-btn:hover{color:var(--text);border-color:var(--accent)}
.m pre .lang{position:absolute;top:4px;left:8px;font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.m h1,.m h2,.m h3{color:var(--text);margin:var(--sp-s) 0 var(--sp-xs)}
.m h1{font-size:var(--fs-l);font-weight:600}
.m h2{font-size:var(--fs-m);font-weight:600}
.m h3{font-size:var(--fs-s);font-weight:600;color:var(--t2)}
.m a{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--accent)}
.m a:hover{border-bottom-style:solid}
.m ul,.m ol{padding-left:var(--sp-l);margin:var(--sp-xs) 0}
.m li{margin:2px 0}
.thinking{padding:var(--sp-s) var(--sp-m);color:var(--t3);font-size:var(--fs-s);font-family:var(--font-mono);display:flex;align-items:center;gap:var(--sp-s)}
.thinking .dots{display:inline-flex;gap:3px}
.thinking .dots span{width:4px;height:4px;background:var(--t3);border-radius:50%;animation:pulse .8s infinite}
.thinking .dots span:nth-child(2){animation-delay:.15s}
.thinking .dots span:nth-child(3){animation-delay:.3s}
.retry-btn{background:none;color:var(--accent);border:1px solid var(--accent);padding:2px 10px;font-size:var(--fs-xs);cursor:pointer;font-family:var(--font-mono);margin-left:var(--sp-s)}
.retry-btn:hover{background:var(--accent-dim)}
.m{position:relative}


/* === CHAT V2 === */
.voice-btn{background:var(--bg);color:var(--t2);border:1px solid var(--border);min-width:42px;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s}
.voice-btn:hover{color:var(--text);border-color:var(--accent)}
.voice-btn.recording{color:var(--accent);border-color:var(--accent);animation:pulse .8s infinite;background:var(--accent-dim)}
.attach-btn{background:var(--bg);color:var(--t2);border:1px solid var(--border);min-width:42px;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s}
.attach-btn:hover{color:var(--text);border-color:var(--accent)}
.drop-zone{border:2px dashed var(--accent);background:var(--accent-dim);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;font-family:var(--font-mono);color:var(--accent)}
.attached-files{display:flex;gap:var(--sp-xs);padding:var(--sp-xs) var(--sp-m);flex-wrap:wrap}
.attached-file{font-size:var(--fs-xs);color:var(--t2);background:var(--sf);border:1px solid var(--border);padding:2px 8px;display:flex;align-items:center;gap:4px;font-family:var(--font-mono)}
.attached-file .rm{cursor:pointer;color:var(--accent)}
.conn-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.conn-dot.on{background:var(--green);box-shadow:0 0 4px var(--green)}
.conn-dot.off{background:var(--accent)}
.m .fpath{color:var(--cyan,#4af);font-family:var(--font-mono);font-size:var(--fs-chat-pre);border-bottom:1px dotted}
.m table{border-collapse:collapse;margin:var(--sp-s) 0;font-size:var(--fs-s);width:100%}
.m th,.m td{border:1px solid var(--border);padding:4px 8px}
.m th{background:var(--sf);font-weight:600}
.draft-ind{font-size:8px;color:var(--t3);font-family:var(--font-mono);padding:0 var(--sp-m)}


/* === SLASH + FOLD + COPY === */
.slash-menu{position:absolute;bottom:100%;left:0;right:0;background:var(--sf);border:1px solid var(--border);max-height:200px;overflow-y:auto;z-index:60}
.slash-item{padding:var(--sp-xs) var(--sp-m);font-size:var(--fs-s);cursor:pointer;display:flex;justify-content:space-between;font-family:var(--font-mono)}
.slash-item:hover,.slash-item.active{background:var(--sf2);color:var(--accent)}
.slash-item .desc{color:var(--t3);font-size:var(--fs-xs)}
.msg-copy{position:absolute;top:4px;right:4px;background:var(--sf);border:1px solid var(--border);color:var(--t3);padding:1px 6px;font-size:8px;cursor:pointer;font-family:var(--font-mono);opacity:0;transition:opacity .15s}
.m:hover .msg-copy{opacity:1}
.m:hover .msg-copy:hover{color:var(--accent);border-color:var(--accent)}
.paste-preview{padding:var(--sp-xs) var(--sp-m);display:flex;gap:var(--sp-s);align-items:center}
.paste-preview img{max-height:60px;border:1px solid var(--border)}
.paste-preview .rm{cursor:pointer;color:var(--accent);font-size:var(--fs-xs)}

/* === FEED === */
.feed{border-top:1px solid var(--border);padding:var(--sp-xs) var(--sp-2xl);font-size:var(--fs-xs);color:var(--t3);max-height:50px;overflow-y:auto;flex-shrink:0;font-family:var(--font-mono)}
</style></head>
<body>
<script type="module">
import{render,html,signal,effect,useRef,useEffect}from'/vendor/preact-bundle.mjs';

// ===== STATE (signals — reactive, global) =====
const agents=signal([]);
const currentProject=signal(null);
const sideMessages=signal([]);
const sideTitle=signal('orchestrator');
const streamText=signal('');
const isStreaming=signal(false);
const thinkStart=signal(0);
const lastUserMsg=signal('');
const isRec=signal(false);const attFiles=signal([]);const isOn=signal(true);const isDrag=signal(false);const inpHist=[];let hIdx=-1;const hasDraft=signal(false);
const slashOpen=signal(false);const slashItems=signal([]);const pastedImg=signal(null);
const SLASH_CMDS=[{cmd:'/clear',desc:'Clear chat'},{cmd:'/mode-code',desc:'Code mode'},{cmd:'/mode-design',desc:'Design mode'},{cmd:'/mode-review',desc:'Review mode'},{cmd:'/mode-fix',desc:'Fix mode'},{cmd:'/status',desc:'Status'},{cmd:'/health',desc:'Health check'},{cmd:'/briefing',desc:'Briefing'},{cmd:'/help',desc:'Commands list'}];
const delegations=signal({});
const theme=signal(localStorage.getItem('theme')||'dark');
const feedItems=signal([]);

const toasts=signal([]);
const isLoading=signal(true);
let toastId=0;
function showToast(msg,type='info',ttl=4000){const id=++toastId;toasts.value=[...toasts.value,{id,msg,type}];setTimeout(()=>{toasts.value=toasts.value.filter(t=>t.id!==id);},ttl);}

const clock=signal(new Date().toLocaleTimeString());
const segments=signal({});
const activeFilter=signal('');
const modules=signal([]);
const searchQuery=signal('');
const actionPlan=signal(null);
const showKbHelp=signal(false);
const showPlan=signal(true);
const orchOk=signal(false);
const projectPlan=signal(null);
const activities=signal({});  // project → {action, detail, started}

setInterval(()=>clock.value=new Date().toLocaleTimeString(),1000);
effect(()=>{
  document.documentElement.setAttribute('data-theme',theme.value==='light'?'light':'');
  localStorage.setItem('theme',theme.value);
});
effect(()=>{
  const p=currentProject.value;
  sideTitle.value=p?p+' agent':'orchestrator';
  loadChat(p||'_orchestrator');
  if(p){loadModules(p);loadProjectPlan(p);}else{projectPlan.value=null;}
});

// ===== API =====

let recog=null;
function togVoice(){if(!("webkitSpeechRecognition" in window)&&!("SpeechRecognition" in window)){showToast("No speech API","error");return;}if(isRec.value){recog?.stop();isRec.value=false;return;}const S=window.SpeechRecognition||window.webkitSpeechRecognition;recog=new S();recog.continuous=false;recog.interimResults=false;recog.lang="ru-RU";recog.onresult=e=>{const t=e.results[0][0].transcript;const ta=document.querySelector(".ch-inp textarea");if(ta){ta.value=(ta.value?ta.value+" ":"")+t;ta.dispatchEvent(new Event("input"));}};recog.onend=()=>isRec.value=false;recog.onerror=e=>{isRec.value=false;};recog.start();isRec.value=true;}
function hdlFiles(fl){const nf=[...attFiles.value];for(const f of fl)nf.push({name:f.name,size:f.size});attFiles.value=nf;}
function rmFile(i){attFiles.value=attFiles.value.filter((_,j)=>j!==i);}
async function chkConn(){try{const r=await fetch("/api/health");isOn.value=r.ok;}catch{isOn.value=false;}}
setInterval(chkConn,15000);
let draftT=null;
function saveDr(){const ta=document.querySelector(".ch-inp textarea");if(ta?.value?.trim()){localStorage.setItem("dr_"+(currentProject.value||"o"),ta.value);hasDraft.value=true;}else hasDraft.value=false;}
function loadDr(){const d=localStorage.getItem("dr_"+(currentProject.value||"o"));if(d){const ta=document.querySelector(".ch-inp textarea");if(ta){ta.value=d;hasDraft.value=true;}}}
function clrDr(){localStorage.removeItem("dr_"+(currentProject.value||"o"));hasDraft.value=false;}
function beep(){try{const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=800;g.gain.value=0.08;o.start();g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.12);o.stop(a.currentTime+0.12);}catch{}}

function handleSlash(val){if(val.startsWith('/')){const q=val.slice(1).toLowerCase();const m=SLASH_CMDS.filter(c=>c.cmd.slice(1).includes(q));slashItems.value=m;slashOpen.value=m.length>0;}else slashOpen.value=false;}
function execSlash(cmd){slashOpen.value=false;if(cmd==='/clear'){sideMessages.value=[];showToast('Cleared','success');return true;}if(cmd==='/help'){showToast(SLASH_CMDS.map(c=>c.cmd+' - '+c.desc).join(', '),'info',8000);return true;}if(cmd==='/briefing'){fetch('/api/digest').then(r=>r.json()).then(d=>showToast(d.text,'info',8000));return true;}return false;}
function handlePaste(e){const items=e.clipboardData?.items;if(!items)return;for(const item of items){if(item.type.startsWith('image/')){e.preventDefault();const blob=item.getAsFile();const r=new FileReader();r.onload=()=>{pastedImg.value={data:r.result,name:'screenshot.png'};};r.readAsDataURL(blob);}}}
async function loadAgents(){try{const r=await fetch('/api/agents');if(!r.ok)throw new Error('API error '+r.status);const d=await r.json();if(d.agents)agents.value=d.agents;if(d.error)showToast(d.error,'error');}catch(e){showToast('Cannot reach dashboard server','error');}}
async function checkOrch(){try{const r=await fetch('/api/health');const d=await r.json();orchOk.value=!!d.orchestrator;}catch{}}
async function loadSegments(){try{const r=await fetch('/api/segments');const d=await r.json();if(d.segments)segments.value=d.segments;}catch{}}
async function loadChat(p){try{const r=await fetch('/api/chat/'+encodeURIComponent(p));const d=await r.json();const msgs=d.messages||[];sideMessages.value=msgs;
// Restore delegation state from history
const newDel={...delegations.value};
for(const m of msgs){const dm=m.msg?.match(/<delegation id="([^"]+)" project="([^"]+)"\/>/);if(dm&&!newDel[dm[1]]){newDel[dm[1]]={project:dm[2],status:m.msg.includes('✓')?'done':'pending'};}}
delegations.value=newDel;
}catch{sideMessages.value=[];}}
async function loadModules(p){try{const r=await fetch('/api/modules/'+encodeURIComponent(p));const d=await r.json();modules.value=d.modules||[];}catch{modules.value=[];}}
async function loadPlan(){try{const r=await fetch('/api/plan');const d=await r.json();actionPlan.value=d;}catch{}}
async function loadProjectPlan(p){try{const r=await fetch("/api/project-plan/"+encodeURIComponent(p));projectPlan.value=await r.json();}catch{projectPlan.value=null;}}
async function loadFeed(){try{const r=await fetch('/api/feed');const d=await r.json();feedItems.value=d.feed||[];}catch{}}
async function loadActivity(){
  try{
    const r=await fetch('/api/activity');const d=await r.json();
    activities.value=d.activities||{};
    // Show recovery notification if tasks were running when page loaded
    const acts=d.activities||{};
    const pending=Object.entries(acts);
    if(pending.length&&!window._recoveryShown){
      window._recoveryShown=true;
      const names=pending.map(([k,v])=>k+' ('+v.action+')').join(', ');
      console.log('Recovering running tasks:',names);
    }
  }catch{}
}

async function sendMessage(msg){
  if(!msg.trim())return;
  const proj=currentProject.value||'';
  lastUserMsg.value=msg;if(attFiles.value.length){msg+=' | Attached: '+attFiles.value.map(f=>f.name).join(', ');}attFiles.value=[];clrDr();
sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'user',msg}];
  isStreaming.value=true;streamText.value='';thinkStart.value=Date.now();
  try{
    const r=await fetch('/api/chat-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project:proj,message:msg})});
    const reader=r.body.getReader();const dec=new TextDecoder();let buf='',full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const ln of lines){
        if(!ln.startsWith('data: '))continue;
        const p=ln.slice(6);if(p==='[DONE]')break;
        try{const d=JSON.parse(p);if(d.text){full+=d.text;streamText.value=full;}}catch{}
      }
    }
    isStreaming.value=false;
    const dm=full.match(/<delegation id="([^"]+)" project="([^"]+)"\/>/);
    if(dm){delegations.value={...delegations.value,[dm[1]]:{project:dm[2],status:'pending'}};}
    beep();sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'assistant',msg:full}];
    streamText.value='';loadFeed();
  }catch(e){isStreaming.value=false;sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'assistant',msg:'Error: '+e.message}];}
}

async function approveDel(id){
  const d={...delegations.value};d[id]={...d[id],status:'running'};delegations.value=d;
  try{
    const r=await fetch('/api/approve/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const res=await r.json();
    const d2={...delegations.value};d2[id]={...d2[id],status:'done'};delegations.value=d2;
    sideMessages.value=[...sideMessages.value,{ts:new Date().toISOString(),role:'system',msg:'✓ '+res.project+': '+(res.response||'').substring(0,200)}];
  }catch{const d2={...delegations.value};d2[id]={...d2[id],status:'error'};delegations.value=d2;}
}
async function rejectDel(id){
  const d={...delegations.value};d[id]={...d[id],status:'rejected'};delegations.value=d;
  fetch('/api/reject/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
}

// ===== HELPERS =====
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function md(s){if(!s)return'';return esc(s).replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/^- (.+)$/gm,'• $1').replace(/\n/g,'<br>');}
const ft=t=>{try{const d=new Date(t||Date.now());const s=Math.floor((Date.now()-d.getTime())/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}catch{return'';}};
const SC={working:'var(--green)',idle:'var(--yellow)',sleeping:'var(--mute)',blocked:'var(--accent)'};
const SL={working:'active',idle:'idle',sleeping:'sleeping',blocked:'blocked'};

// ===== COMPONENTS =====

function OrchWarning(){
  if(orchOk.value)return null;
  return html`<div style="padding:var(--sp-s) var(--sp-l);background:var(--accent-dim);border-bottom:1px solid var(--accent);font-size:var(--fs-s);color:var(--accent);font-family:var(--font-mono);display:flex;align-items:center;gap:var(--sp-s)">
    <span>WARNING:</span> No orchestrator project found. Chat will run in template context.
    <span style="color:var(--t2)">Fix: bash setup.sh my-pa --orchestrator</span>
  </div>`;
}
function App(){return html`<div class="app"><${Toasts}/><${KeyboardHelp}/><${OrchWarning}/><${Header}/><div class="main">${currentProject.value?html`<${DetailView}/>`:html`<${DashboardView}/>`}<${ChatSidebar}/></div><${AnalyticsBar}/></div>`;}

function Header(){return html`<div class="hdr"><h1>command center</h1><div class="r">
  ${(()=>{const pending=Object.values(delegations.value).filter(d=>d.status==="pending").length;return pending?html`<span class="badge">${pending}</span>`:null;})()}<button onClick=${()=>fetch('/api/digest').then(r=>r.json()).then(d=>{const plan=d.plan||[];const hi=plan.filter(p=>p.priority==='HIGH');showToast(d.text||'No data','info',10000);})}>briefing</button>
  <button onClick=${()=>{loadAgents();loadFeed();}}>refresh</button>
  <button onClick=${()=>theme.value=theme.value==='dark'?'light':'dark'}>${theme.value==='dark'?'light':'dark'}</button>
  <span>${clock}</span>
</div></div>`;}

function StatsRow(){
  const a=agents.value;const na=a.filter(x=>x.blockers||(x.uncommitted||0)>20).length;const act=a.filter(x=>x.task).length;const h=a.filter(x=>!x.blockers&&x.status!=='sleeping').length;const st=a.filter(x=>(x.days||999)>7).length;
  return html`<div class="stats">
    <div class="stat s-alert" style="cursor:pointer" onClick=${()=>activeFilter.value=activeFilter.value==='attention'?'':'attention'}><div class="n">${na}</div><div class="l">need attention</div></div>
    <div class="stat s-active" style="cursor:pointer" onClick=${()=>activeFilter.value=activeFilter.value==='active'?'':'active'}><div class="n">${act}</div><div class="l">in progress</div></div>
    <div class="stat"><div class="n">${h}</div><div class="l">healthy</div></div>
    <div class="stat" style="cursor:pointer" onClick=${()=>activeFilter.value=activeFilter.value==='stale'?'':'stale'}><div class="n" style="color:var(--mute)">${st}</div><div class="l">stale</div></div>
    <div class="stat"><div class="n">${a.length}</div><div class="l">total</div></div>
  </div>`;
}


function EmptyState(){return html`<div style="padding:var(--sp-2xl);max-width:600px;margin:0 auto">
  <div style="font-size:var(--fs-xl);margin-bottom:var(--sp-xl);font-family:var(--font-mono);letter-spacing:2px">SETUP REQUIRED</div>
  <div style="border:1px solid var(--border);padding:var(--sp-l);margin-bottom:var(--sp-l)">
    <div style="font-size:var(--fs-s);color:var(--accent);font-family:var(--font-mono);letter-spacing:1px;margin-bottom:var(--sp-m)">STEP 1 — CREATE ORCHESTRATOR</div>
    <p style="color:var(--t2);margin-bottom:var(--sp-m)">The orchestrator is your central project manager. It delegates tasks to other project agents.</p>
    <pre style="padding:var(--sp-m);background:var(--sf);border:1px solid var(--border);font-size:var(--fs-s);overflow-x:auto">bash setup.sh my-assistant --orchestrator</pre>
  </div>
  <div style="border:1px solid var(--border);padding:var(--sp-l);margin-bottom:var(--sp-l)">
    <div style="font-size:var(--fs-s);color:var(--green);font-family:var(--font-mono);letter-spacing:1px;margin-bottom:var(--sp-m)">STEP 2 — CREATE PROJECTS</div>
    <p style="color:var(--t2);margin-bottom:var(--sp-m)">Each project gets its own agent with rules, memory, and tools.</p>
    <pre style="padding:var(--sp-m);background:var(--sf);border:1px solid var(--border);font-size:var(--fs-s);overflow-x:auto">bash setup.sh my-app</pre>
  </div>
  <div style="border:1px solid var(--border);padding:var(--sp-l)">
    <div style="font-size:var(--fs-s);color:var(--t2);font-family:var(--font-mono);letter-spacing:1px;margin-bottom:var(--sp-m)">STEP 3 — RESTART DASHBOARD</div>
    <p style="color:var(--t2)">After creating projects, restart: <code>bash start.sh</code></p>
    <p style="color:var(--t3);margin-top:var(--sp-s);font-size:var(--fs-s)">Projects must be in your Documents folder (or configure <code>n8n/config.json</code>)</p>
  </div>
</div>`;}


function SearchBar(){
  return html`<div class="search">
    <input placeholder="search projects..." value=${searchQuery.value}
      onInput=${e=>searchQuery.value=e.target.value}
      onKeyDown=${e=>{if(e.key==='Escape'){searchQuery.value='';e.target.blur();}}}/>
  </div>`;
}


function PlanPanel(){
  const p=actionPlan.value;
  if(!p||!p.high_count)return null;
  const high=showPlan.value?p.plan.filter(x=>x.priority==='HIGH'):[];
  return html`<div class="plan-panel">
    <div class="plan-hdr" onClick=${()=>showPlan.value=!showPlan.value}>
      <span style="color:var(--accent)">⚠ ${p.high_count} project(s) need attention</span>
      <span>${showPlan.value?'▾':'▸'}</span>
    </div>
    ${high.map(item=>html`<div class="plan-item" style="cursor:pointer" onClick=${()=>currentProject.value=item.project}>
      <span class="proj">${item.project}</span>
      <span class="issue">${item.issues.join(' · ')}</span>
      <span class="act">→</span>
    </div>`)}
  </div>`;
}


function KeyboardHelp(){
  if(!showKbHelp.value)return null;
  return html`<div class="kb-overlay" onClick=${()=>showKbHelp.value=false}>
    <div class="kb-box" onClick=${e=>e.stopPropagation()}>
      <h2>keyboard shortcuts</h2>
      <div class="kb-row"><span class="kb-key">/</span><span class="kb-desc">Focus chat input</span></div>
      <div class="kb-row"><span class="kb-key">Esc</span><span class="kb-desc">Back to dashboard</span></div>
      <div class="kb-row"><span class="kb-key">D</span><span class="kb-desc">Toggle dark/light theme</span></div>
      <div class="kb-row"><span class="kb-key">S</span><span class="kb-desc">Focus search</span></div>
      <div class="kb-row"><span class="kb-key">R</span><span class="kb-desc">Refresh data</span></div>
      <div class="kb-row"><span class="kb-key">P</span><span class="kb-desc">Toggle action plan</span></div>
      <div class="kb-row"><span class="kb-key">?</span><span class="kb-desc">Show this help</span></div>
    </div>
  </div>`;
}


function AnalyticsBar(){
  const a=agents.value;
  const totalDirty=a.reduce((s,x)=>s+(x.uncommitted||0),0);
  const totalLessons=a.reduce((s,x)=>s+(x.lessons||0),0);
  const p=actionPlan.value;
  return html`<div class="analytics-bar">
    <div class="metric"><span>projects:</span><span class="v">${a.length}</span></div>
    <div class="metric"><span>uncommitted:</span><span class="v${totalDirty>50?' alert':''}">${totalDirty}</span></div>
    <div class="metric"><span>lessons:</span><span class="v">${totalLessons}</span></div>
    ${p?html`<div class="metric"><span>issues:</span><span class="v${p.high_count?' alert':''}">${p.total_issues} (${p.high_count} high)</span></div>`:null}
    <div style="flex:1"></div>
    <div class="metric" style="cursor:pointer;color:var(--t3)" onClick=${()=>showKbHelp.value=true}>? shortcuts</div>
  </div>`;
}

function DashboardView(){
  const seg=segments.value;let a=agents.value;
const sq=searchQuery.value.toLowerCase();
if(sq)a=a.filter(x=>x.name.toLowerCase().includes(sq)||x.task?.toLowerCase().includes(sq)||(x.segment||'').toLowerCase().includes(sq));
const af=activeFilter.value;
if(af==='attention')a=a.filter(x=>x.blockers||(x.uncommitted||0)>20);
if(af==='active')a=a.filter(x=>x.task);
if(af==='stale')a=a.filter(x=>(x.days||999)>7);const segMap={};const assigned=new Set();
  for(const[name,projects]of Object.entries(seg)){segMap[name]=a.filter(x=>projects.includes(x.name));projects.forEach(p=>assigned.add(p));}
  const other=a.filter(x=>!assigned.has(x.name));if(other.length)segMap['Other']=other;
  if(!a.length&&!isLoading.value&&!af)return html`<div class="content"><${StatsRow}/><${EmptyState}/></div>`;
  const filterBar=af?html`<div style="font-size:var(--fs-xs);color:var(--t3);margin-bottom:var(--sp-s)">Filter: ${af} <span style="cursor:pointer;color:var(--accent)" onClick=${()=>activeFilter.value=''}>clear</span></div>`:null;
  return html`<div class="content"><${StatsRow}/><${SearchBar}/><${PlanPanel}/>${filterBar}
    ${Object.entries(segMap).filter(([_,i])=>i.length).map(([name,items])=>html`
      <div class="seg-title"><span>${name}</span><span style="font-size:var(--fs-xs);color:var(--t3)">${items.length} projects</span></div>
      <div class="grid">${items.map(ag=>html`<${Tile} a=${ag}/>`)}</div>
    `)}
  </div>`;
}

function Tile({a}){
  const act=activities.value[a.name];
  const isActive=!!act;
  const stCls=isActive?'t-working':a.blockers?'t-blocked':a.status==='sleeping'?'t-sleeping':a.managed===false?'t-unmanaged':'';
  const sysText=a.managed===false?'UNMANAGED':a.blockers?'SYS.BLOCKED':(a.uncommitted||0)>10?'SYS.DIRTY':isActive?'SYS.EXEC':'SYS.OK';
  return html`<div class="tile ${stCls}" onClick=${()=>currentProject.value=a.name}>
    <div class="top">
      <span class="name"><span class="dot ${isActive?'working':a.status}" style=${isActive?'animation:pulse .8s infinite':''}></span>${a.name}${a.blockers?html` <span style="color:var(--accent);font-size:var(--fs-xs)">· BLOCKED</span>`:''}</span>
    </div>
    ${isActive?html`<div style="font-size:var(--fs-xs);color:var(--green);margin:var(--sp-xs) 0;font-family:var(--font-mono)">⚡ ${act.action}: ${act.detail}</div>`:html`<div style="font-size:var(--fs-s);color:var(--t2);margin:var(--sp-xs) 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" dangerouslySetInnerHTML=${{__html:a.task?md(a.task.substring(0,80)):'<span style="color:var(--t3)">no active task</span>'}}></div>`}
    <div class="row"><span style="color:${SC[isActive?'working':a.status]||'var(--t3)'}">${isActive?'executing':SL[a.status]||a.status}</span>${(a.uncommitted||0)>10?html`<span style="color:var(--accent)">${a.uncommitted} dirty</span>`:(a.uncommitted||0)>0?html`<span>${a.uncommitted} uncommitted</span>`:''}${a.lessons?html`<span>${a.lessons}L</span>`:''}</div>
    <div class="sys">${sysText}</div>
    <div class="seg">${[0,1,2,3,4].map(i=>{const fill=isActive?5:a.blockers?1:a.task?3:a.days<7?2:0;const color=i<fill?(isActive?'var(--green)':a.blockers?'var(--accent)':a.task?'var(--cyan)':'var(--green)'):'var(--mute)';return html`<span style="background:${color}"/>`;})}</div>
  </div>`;
}

function DetailView(){
  const name=currentProject.value;const ag=agents.value.find(a=>a.name===name)||{};
  const act=activities.value[name];
  const pp=projectPlan.value;
  return html`<div class="content">
    <div class="back" onClick=${()=>currentProject.value=null}>← back to dashboard</div>
    <h2 style="font-size:var(--fs-xl);display:flex;align-items:center;gap:var(--sp-s)"><span class="dot ${act?'working':ag.status}"></span>${name}</h2>
    <div style="font-size:var(--fs-s);color:var(--t2);margin:var(--sp-s) 0;display:flex;gap:var(--sp-l);flex-wrap:wrap">
      <span style="color:${SC[act?'working':ag.status]||'var(--t3)'}">${act?'executing':ag.status||''}</span>
      <span>branch: <code>${ag.branch||'—'}</code></span>
      <span>${ag.uncommitted||0} uncommitted</span>
      ${ag.template_version?html`<span>template ${ag.template_version}</span>`:''}
      <span>${ag.lessons||0} lessons</span>
      ${ag.blockers?html`<span style="color:var(--accent);font-weight:600">BLOCKED</span>`:''}
    </div>
    ${act?html`<div style="padding:var(--sp-s) var(--sp-m);margin:var(--sp-s) 0;background:var(--sf);border-left:2px solid var(--green);font-size:var(--fs-s);color:var(--green);font-family:var(--font-mono)">Running: ${act.action} — ${act.detail}</div>`:''}
    ${pp&&pp.context?.task_title?html`<div style="padding:var(--sp-s) var(--sp-m);margin:var(--sp-s) 0;background:var(--sf);border-left:2px solid var(--yellow);font-size:var(--fs-s)"><strong>Task:</strong> ${pp.context.task_title}</div>`:(ag.task?html`<div style="padding:var(--sp-s) var(--sp-m);margin:var(--sp-s) 0;background:var(--sf);border-left:2px solid var(--yellow);font-size:var(--fs-s)"><strong>Task:</strong> <span dangerouslySetInnerHTML=${{__html:md(ag.task)}}></span></div>`:'')}
    ${pp&&pp.blockers?.length?html`<div style="padding:var(--sp-s) var(--sp-m);margin:var(--sp-s) 0;background:var(--sf);border-left:2px solid var(--accent);font-size:var(--fs-s)"><strong style="color:var(--accent)">Blockers:</strong>
      ${pp.blockers.map(b=>html`<div style="margin:var(--sp-xs) 0;padding-left:var(--sp-m);color:var(--t2)">• ${b}</div>`)}
    </div>`:''}
    <div class="panels">
      <div class="panel"><h3>next steps</h3>${pp&&pp.next_steps?.length?pp.next_steps.map((s,i)=>html`<div class="mod"><span style="color:var(--t3);min-width:20px">${i+1}.</span><span style="color:var(--t2)">${s}</span></div>`):html`<span style="color:var(--t3)">No next steps in tasks/current.md</span>`}</div>
      <div class="panel"><h3>issues</h3>${pp&&pp.issues?.length?pp.issues.map(iss=>html`<div class="mod"><span class="pri ${iss.priority}" style="font-size:var(--fs-xs);padding:0 4px;border:1px solid">${iss.priority}</span><span style="color:var(--t2);margin-left:var(--sp-s)">${iss.text}</span></div>`):html`<span style="color:var(--green)">No issues detected</span>`}</div>
    </div>
    <div class="panels">
      <div class="panel"><h3>modules</h3>${modules.value.length?modules.value.map(m=>html`<div class="mod"><span>${m.name}</span><span class="${m.status}">${m.status} ${m.files}f/${m.lines}L</span></div>`):html`<span style="color:var(--t3)">Scan via chat</span>`}</div>
      <div class="panel"><h3>context</h3><div style="font-size:var(--fs-s);color:var(--t2)">
        <div style="margin-bottom:var(--sp-xs)">phase: ${pp?.context?.phase||ag.phase||'unknown'}</div>
        <div style="margin-bottom:var(--sp-xs)">segment: ${ag.segment||'unassigned'}</div>
        ${pp?.context?.recent_commits?html`<div style="margin-top:var(--sp-s)"><strong>Recent:</strong>${pp.context.recent_commits.map(cm=>html`<div style="color:var(--t3);font-family:var(--font-mono);font-size:var(--fs-xs);margin:2px 0">${cm}</div>`)}</div>`:''}
      </div></div>
    </div>
  </div>`;
}

function RunningBanner(){
  const proj=currentProject.value||'_orchestrator';
  const act=activities.value[proj];
  if(!act)return null;
  const elapsed=Math.round((Date.now()/1000)-act.started);
  return html`<div style="padding:var(--sp-s) var(--sp-m);background:var(--sf);border-bottom:1px solid var(--border);font-size:var(--fs-s);color:var(--green);font-family:var(--font-mono);display:flex;align-items:center;gap:var(--sp-s)">
    <span style="animation:pulse .8s infinite">⚡</span> ${act.action}: ${act.detail} (${elapsed}s)
  </div>`;
}

function ChatSidebar(){
  const inputRef=useRef();const msgsRef=useRef();const fileRef=useRef();
  const prevCount=useRef(0);
  useEffect(()=>{const cnt=sideMessages.value.length;const s=isStreaming.value;if(msgsRef.current&&(cnt!==prevCount.current||s)){msgsRef.current.scrollTop=msgsRef.current.scrollHeight;prevCount.current=cnt;}});
  useEffect(()=>{loadDr();},[currentProject.value]);
  const send=()=>{const v=inputRef.current?.value;if(!v?.trim())return;if(v.startsWith('/')&&execSlash(v.trim())){inputRef.current.value='';return;}inputRef.current.value='';inputRef.current.style.height='36px';inpHist.unshift(v);hIdx=-1;if(pastedImg.value){pastedImg.value=null;}sendMessage(v);};
  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}if(e.key==='ArrowUp'&&!inputRef.current?.value&&inpHist.length){hIdx=Math.min(hIdx+1,inpHist.length-1);inputRef.current.value=inpHist[hIdx];}if(e.key==='ArrowDown'&&hIdx>=0){hIdx--;inputRef.current.value=hIdx>=0?inpHist[hIdx]:'';}};
  const onDrop=e=>{e.preventDefault();isDrag.value=false;if(e.dataTransfer?.files?.length)hdlFiles(e.dataTransfer.files);};
  return html`<div class="chat-side" onDragOver=${e=>{e.preventDefault();isDrag.value=true;}} onDragLeave=${()=>isDrag.value=false} onDrop=${onDrop}>
    <div class="ch-title"><span class="conn-dot ${isOn.value?'on':'off'}"/>${sideTitle}</div>
    ${isDrag.value?html`<div class="drop-zone">Drop files here</div>`:null}
    <${RunningBanner}/>
    <div class="ch-msgs" ref=${msgsRef}>
      ${sideMessages.value.map((m,i)=>html`<${ChatMsg} key=${i} m=${m}/>`)}
      <${StreamBubble}/>
    </div>
    ${attFiles.value.length?html`<div class="attached-files">${attFiles.value.map((fi,i)=>html`<div class="attached-file"><span>${fi.name}</span><span class="rm" onClick=${()=>rmFile(i)}>x</span></div>`)}</div>`:null}
    ${hasDraft.value?html`<div class="draft-ind">draft saved</div>`:null}
    <div class="ch-inp">
      <button class="attach-btn" onClick=${()=>fileRef.current?.click()} title="Attach">+</button>
      <input type="file" ref=${fileRef} style="display:none" multiple onChange=${e=>{if(e.target.files.length)hdlFiles(e.target.files);e.target.value='';}}/>
      <textarea ref=${inputRef} placeholder="talk to ${sideTitle.value}..." rows="1" onKeyDown=${onKey} onInput=${e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,150)+'px';handleSlash(e.target.value);clearTimeout(draftT);draftT=setTimeout(saveDr,2000);}} onPaste=${handlePaste} disabled=${isStreaming.value}/>
      <button class="voice-btn ${isRec.value?'recording':''}" onClick=${togVoice} title="Voice">${isRec.value?'⏹':'○'}</button>
      <button class="send-btn" onClick=${send} disabled=${isStreaming.value}>send</button>
    </div>
  </div>`;}

function ChatMsg({m}){
  if(m.role==='system')return html`<div class="m" style="color:var(--t3);font-style:italic;font-size:var(--fs-s);align-self:center">${m.msg}</div>`;
  const isViaPA=(m.msg||'').startsWith('[via PA]');
  const isError=(m.msg||'').startsWith('Error:')||(m.msg||'').includes('timed out');
  const canCopy=m.role==='assistant';const cls=m.role==='user'?(isViaPA?'a':'u'):'a';
  const dm=m.msg?.match(/<delegation id="([^"]+)" project="([^"]+)"\/>/);
  const clean=(m.msg||'').replace(/<delegation[^>]*\/>/g,'');
  return html`<div class="m ${cls}">
    ${isViaPA?html`<div style="font-size:var(--fs-xs);color:var(--yellow);font-family:var(--font-mono);margin-bottom:var(--sp-xs)">via PA</div>`:null}<div dangerouslySetInnerHTML=${{__html:m.role==='assistant'?md(clean):esc(isViaPA?(m.msg||'').replace('[via PA] ',''):m.msg)}}></div>
    ${canCopy?html`<button class="msg-copy" onClick=${()=>{navigator.clipboard.writeText(m.msg||'');showToast('Copied','success',1500);}}>copy</button>`:''}
    ${dm?html`<${DelegBtn} id=${dm[1]} project=${dm[2]}/>`:null}
    <div class="ts">${ft(m.ts)}${isError&&m.role==='assistant'?html` <button class="retry-btn" onClick=${()=>sendMessage(lastUserMsg.value)}>retry</button>`:''}</div>
  </div>`;
}

function StreamBubble(){
  if(!isStreaming.value&&!streamText.value)return null;
  if(!streamText.value){const el=thinkStart.value?Math.round((Date.now()-thinkStart.value)/1000):0;return html`<div class="thinking"><div class="dots"><span/><span/><span/></div> thinking${el>2?'... '+el+'s':''}</div>`;}
  return html`<div class="m a"><div dangerouslySetInnerHTML=${{__html:md(streamText.value.replace(/<delegation[^>]*\/>/g,''))}}></div></div>`;
}

function DelegBtn({id,project}){
  const d=delegations.value[id];
  if(!d||d.status==='pending')return html`<div style="margin:8px 0;padding:8px;border:1px solid var(--border);background:var(--sf)">
    <div style="font-size:var(--fs-s);color:var(--t2);margin-bottom:6px">Approve task for ${project}?</div>
    <div style="display:flex;gap:8px">
      <button onClick=${()=>approveDel(id)} style="background:var(--green);color:#000;border:none;padding:6px 16px;cursor:pointer;font-family:var(--font-mono);font-size:var(--fs-s)">APPROVE</button>
      <button onClick=${()=>rejectDel(id)} style="background:var(--accent);color:#fff;border:none;padding:6px 16px;cursor:pointer;font-family:var(--font-mono);font-size:var(--fs-s)">REJECT</button>
    </div></div>`;
  if(d.status==='running')return html`<div style="color:var(--yellow);font-size:var(--fs-s);padding:4px 0">⏳ executing...</div>`;
  if(d.status==='done')return html`<div style="color:var(--green);font-size:var(--fs-s);padding:4px 0">✓ done</div>`;
  if(d.status==='rejected')return html`<div style="color:var(--accent);font-size:var(--fs-s);padding:4px 0">✗ rejected</div>`;
  return null;
}


function Toasts(){return html`<div class="toasts">${toasts.value.map(t=>html`<div class="toast ${t.type}" key=${t.id}>${t.msg}</div>`)}</div>`;}

function Feed(){return html`<div class="feed">${feedItems.value.length?feedItems.value.map(e=>html`<span>${ft(e.time)} [${e.type}] <b>${e.project||''}</b> ${(e.message||'').substring(0,40)}${'  '}</span>`):'no activity'}</div>`;}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Escape'){currentProject.value=null;return;}
  if(e.key==='/'){e.preventDefault();document.querySelector('.ch-inp input')?.focus();return;}
  if(e.key==='d'||e.key==='D'){theme.value=theme.value==='dark'?'light':'dark';return;}
  if(e.key==='?'){showKbHelp.value=!showKbHelp.value;return;}
  if(e.key==='s'||e.key==='S'){e.preventDefault();document.querySelector('.search input')?.focus();return;}
  if(e.key==='r'||e.key==='R'){loadAgents();loadPlan();loadFeed();showToast('Refreshed','success',2000);return;}
  if(e.key==='p'||e.key==='P'){showPlan.value=!showPlan.value;return;}
});

// ===== INIT =====
await Promise.all([loadAgents(),loadSegments(),loadFeed(),loadActivity(),loadPlan(),checkOrch(),chkConn()]);isLoading.value=false;
render(html`<${App}/>`,document.body);
setInterval(()=>{loadAgents();loadActivity();loadPlan();if(!currentProject.value){loadChat('_orchestrator');}loadFeed();},5000);
</script>

</body></html>
